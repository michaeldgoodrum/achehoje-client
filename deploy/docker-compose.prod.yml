# Production stack for a single host (AWS Lightsail / EC2 t4g.micro).
# Only the web tier is published (port 80). Mongo and the API stay on the
# internal Docker network — not reachable from the internet.
#
# Run from the repository root:
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # No published ports — internal network only.
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: load the read-only catalog into Mongo, then exit.
  seed:
    build: ../server
    command: node src/seed.js
    environment:
      MONGO_URI: mongodb://mongo:27017/achehoje
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  api:
    build: ../server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/achehoje
    depends_on:
      mongo:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    # No published ports — reached only via the web tier's /api proxy.

  # nginx: serves the built frontend and proxies /api to the API. Internal now —
  # Caddy is the public entrypoint.
  web:
    build:
      context: ..
    restart: unless-stopped
    depends_on:
      - api

  # Caddy: public entrypoint with automatic HTTPS.
  #  - Set SITE_ADDRESS to your domain (e.g. app.example.com) → Caddy fetches and
  #    renews a Let's Encrypt cert and redirects http→https automatically.
  #  - Leave it unset → serves plain HTTP on :80 (fine for an IP-only demo;
  #    Let's Encrypt can't issue certs for a bare IP).
  # Configure via deploy/.env (see deploy/.env.example).
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
