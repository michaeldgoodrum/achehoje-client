server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker's embedded DNS. Resolving the `api` hostname through a variable
  # (below) makes nginx look it up at request time instead of at startup, so
  # the web container won't crash if the API container isn't up yet.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Same-origin API proxy — the frontend calls /api/... with no CORS and no
  # hard-coded backend URL. `api` is the API service name on the compose network.
  location /api/ {
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    set $api_health http://api:3000;
    proxy_pass $api_health$request_uri;
  }

  # SPA fallback — serve index.html for client-side routes (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
