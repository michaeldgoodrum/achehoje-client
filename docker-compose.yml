# Full stack: MongoDB + Express API (seeded on first run) + Vite/nginx frontend.
#
#   docker compose up --build
#
# Frontend → http://localhost:8080
# API      → http://localhost:3000
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: wipe and load the database, then exit.
  seed:
    build: ./server
    command: node src/seed.js
    environment:
      MONGO_URI: mongodb://mongo:27017/achehoje
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/achehoje
    depends_on:
      mongo:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  web:
    # No VITE_API_URL arg — the frontend calls /api same-origin, and nginx
    # (nginx.conf) proxies it to the api service. So http://localhost:8080 is a
    # single, fully working URL.
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo-data:
